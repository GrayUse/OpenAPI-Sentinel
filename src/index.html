<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAPI Sentinel — Lightweight API Validator</title>
  <meta name="description" content="A lightweight, high-performance OpenAPI validation and governance tool. Validate, lint, preview docs, and mock your APIs — all in the browser." />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/index.css" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
      });
    }
  </script>
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="topbar" class="topbar">
      <div class="topbar-left">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="url(#logo-grad)"/>
            <path d="M8 16L14 10L20 16L14 22Z" fill="white" opacity="0.9"/>
            <path d="M14 16L20 10L26 16L20 22Z" fill="white" opacity="0.6"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">Sentinel</span>
        </div>
        <div class="topbar-spec-info" id="spec-info">
          <span class="spec-badge" id="spec-version-badge">—</span>
          <span class="spec-title" id="spec-title">No spec loaded</span>
        </div>
      </div>
      <div class="topbar-center">
        <nav class="tab-nav" id="main-tabs">
          <button class="tab-btn active" data-tab="editor">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3h12M2 6h8M2 9h10M2 12h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Design & Code
          </button>
          <button class="tab-btn" data-tab="docs">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2h7l3 3v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 2v4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Docs
          </button>
          <button class="tab-btn" data-tab="mock">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Mock
          </button>
          <button class="tab-btn" data-tab="rules">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="5" cy="4" r="1.5" fill="currentColor"/><circle cx="11" cy="8" r="1.5" fill="currentColor"/><circle cx="7" cy="12" r="1.5" fill="currentColor"/></svg>
            Rules
          </button>
        </nav>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" id="btn-export" title="Export spec">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10V2M5 5l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Export
          </button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Editor Panel -->
      <div id="panel-editor" class="panel active">
        <div class="editor-layout">
          <!-- Sidebar -->
          <aside id="sidebar" class="sidebar">

            <div class="sidebar-section">
              <h3 class="sidebar-title">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1L15 5v6l-7 4-7-4V5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Structure
              </h3>
              <div id="spec-structure" class="sidebar-list"></div>
            </div>
          </aside>

          <!-- Editor + Form Split View -->
          <div class="editor-main" style="display: flex; flex-direction: row; width: 100%;">
            <!-- Left: Monaco Editor -->
            <div style="flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative;">
              <div id="monaco-editor" class="monaco-container"></div>
              <div id="problems-panel" class="problems-panel collapsed">
                <div class="problems-header" id="problems-header">
                  <div class="problems-title">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1l7 13H1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 6v3M8 11.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Problems
                  </div>
                  <div class="problems-stats" id="problems-stats"></div>
                  <button class="problems-toggle" id="problems-toggle">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
                <div class="problems-body" id="problems-body"></div>
              </div>
            </div>
            
            <!-- Right: Form View -->
            <div id="form-scroll-wrapper" style="flex: 1; min-width: 0; border-left: 1px solid var(--c-border); overflow-y: auto; background: var(--c-bg-surface);">
              <div id="form-container" class="form-container" style="padding: 24px;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Docs Panel -->
      <div id="panel-docs" class="panel">
        <div id="docs-container" class="docs-container">
          <div class="docs-placeholder">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M9 6h21l9 9v27a3 3 0 01-3 3H9a3 3 0 01-3-3V9a3 3 0 013-3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/><path d="M30 6v12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/></svg>
            <p>Load an OpenAPI spec to see the documentation preview</p>
          </div>
        </div>
      </div>

      <!-- Mock Panel -->
      <div id="panel-mock" class="panel">
        <div id="mock-container" class="mock-container"></div>
      </div>

      <!-- Rules Panel -->
      <div id="panel-rules" class="panel">
        <div id="rules-container" class="rules-container"></div>
      </div>
    </main>

    <!-- Status Bar -->
    <footer id="statusbar" class="statusbar">
      <div class="statusbar-left">
        <span class="status-item" id="status-lint">
          <span class="status-dot idle"></span>
          Ready
        </span>
        <span class="status-item" id="status-cursor">Ln 1, Col 1</span>
      </div>
      <div class="statusbar-right">
        <span class="status-item" id="status-format">YAML</span>
        <span class="status-item" id="status-size">0 B</span>
        <span class="status-item label">OpenAPI Sentinel v1.0</span>
      </div>
    </footer>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
